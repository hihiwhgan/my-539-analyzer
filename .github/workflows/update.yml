- name: 提交並推送更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          
          # 如果資料沒變動則不動作
          git commit -m "Auto update data.json" || exit 0
          
          # 關鍵修正：先拉取遠端最新變動，並將機器人的提交接在後面 (rebase)
          git pull --rebase origin main
          
          git push
