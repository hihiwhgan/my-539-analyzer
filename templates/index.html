<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>今彩 539 智慧分析終端</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f4f4f2; padding: 20px; color: #555; }
        .container { max-width: 1350px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h1 { text-align: center; color: #6d6d6d; margin-bottom: 5px; }
        h2 { border-left: 5px solid #8E9AAF; padding-left: 10px; color: #666; font-size: 1.1em; margin-top: 30px; }
        
        /* 莫蘭迪配色與表格樣式保持一致 */
        .legend-item { padding: 3px 10px; border-radius: 4px; color: white; font-weight: bold; font-size: 0.8em; }
        .bg-blue   { background-color: #8E9AAF; color: white !important; }
        .bg-yellow { background-color: #D4A373; color: white !important; }
        .bg-green  { background-color: #A3B18A; color: white !important; }
        .bg-purple { background-color: #957DAD; color: white !important; }

        table { width: 100%; border-collapse: collapse; font-size: 0.82em; table-layout: fixed; margin-bottom: 20px; }
        th { background: #eaeaea; color: #666; padding: 10px; border: 1px solid #ddd; }
        td { padding: 8px 2px; border: 1px solid #efefef; text-align: center; }
        .ball { display: inline-block; width: 22px; height: 22px; line-height: 22px; background: #b8978e; color: white; border-radius: 50%; margin: 0 1px; font-weight: bold; font-size: 0.8em; }
        .diff-num { display: inline-block; width: 22px; height: 22px; border-radius: 4px; font-family: monospace; font-weight: bold; }
        .predict-row { background-color: #444 !important; color: #fff; }
        
        /* 總結報告區塊 */
        .summary-box { background: #333; color: #eee; padding: 25px; border-radius: 12px; margin-top: 40px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .summary-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border-top: 3px solid #8E9AAF; }
        .summary-title { font-weight: bold; color: #ffd700; margin-bottom: 15px; display: block; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .hot-num { display: inline-block; background: #fff; color: #333; padding: 4px 10px; border-radius: 4px; margin: 4px; font-weight: bold; }
        .count-tag { font-size: 0.7em; color: #888; margin-left: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>今彩 539 智慧差值預測終端</h1>
        
        <h2>表格一：基礎差值分析</h2>
        <table id="table1"><thead><tr><th style="width:70px">日期</th><th style="width:150px">開獎號碼</th><th>減前1</th><th>減前2</th><th>減前3</th><th>減前4</th><th>減前5</th></tr></thead><tbody id="tbody1"></tbody><tfoot id="tfoot1"></tfoot></table>
        
        <h2>表格二：累加尾數差值分析</h2>
        <table id="table2"><thead><tr><th style="width:70px">日期</th><th style="width:150px">開獎號碼</th><th>減(尾1)</th><th>減(尾1+2)</th><th>減(尾1~3)</th><th>減(尾1~4)</th><th>減(尾1~5)</th></tr></thead><tbody id="tbody2"></tbody><tfoot id="tfoot2"></tfoot></table>

        <div class="summary-box" id="summaryArea">
            <div class="summary-card" id="algorithmCard">
                <span class="summary-title">🤖 演算法推薦 (熱門路徑預測)</span>
                <div id="algoContent">計算中...</div>
            </div>
            <div class="summary-card" id="historyCard">
                <span class="summary-title">🔥 歷史熱門 (近20期實際開出)</span>
                <div id="historyContent">計算中...</div>
            </div>
            <div class="summary-card" id="coldCard">
                <span class="summary-title">❄️ 遺漏冷門 (近20期未出現)</span>
                <div id="coldContent">計算中...</div>
            </div>
        </div>
    </div>

    <script>
        let allPredictions = []; // 用於收集所有預測號碼

        async function loadData() {
            const response = await fetch('/api/data');
            const data = await response.json();
            
            // 計算歷史統計
            const historyCounts = {};
            data.forEach(d => d.nums.forEach(n => historyCounts[n] = (historyCounts[n] || 0) + 1));

            // 處理表格
            processTable(data, 1);
            processTable(data, 2);

            // 渲染總結報告
            renderSummary(historyCounts);
        }

        function processTable(data, type) {
            const matrix = [];
            for (let i = 0; i < data.length; i++) {
                let d = [];
                if (i > 0) {
                    const prev = data[i-1].nums.map(Number);
                    const curr = data[i].nums.map(Number);
                    const tails = prev.map(n => n % 10);
                    for (let c = 0; c < 5; c++) {
                        if (type === 1) d.push(curr.map(n => Math.abs(n - prev[c])));
                        else { let s=0; for(let k=0;k<=c;k++) s+=tails[k]; d.push(curr.map(n => Math.abs(n-s))); }
                    }
                } else { for(let c=0;c<5;c++) d.push(null); }
                matrix.push(d);
            }
            renderTableBody(data, matrix, type);
            renderTableFoot(data, matrix, type);
        }

        // ... (renderTableBody 邏輯與之前相同，略) ...
        function renderTableBody(data, matrix, type) {
            const tbody = document.getElementById('tbody' + type);
            data.forEach((item, i) => {
                const row = document.createElement('tr');
                const balls = item.nums.map(n => `<span class="ball">${n}</span>`).join('');
                let rowHtml = `<td><strong>${item.period}</strong></td><td>${balls}</td>`;
                for (let c = 0; c < 5; c++) {
                    if (i === 0 || !matrix[i][c]) { rowHtml += `<td>-</td>`; continue; }
                    let cell = matrix[i][c].map(v => {
                        let cls = '';
                        for (let j=0; j<=3; j++) {
                            const targets = [i-(j+1), i+(j+1)];
                            if (targets.some(t => t>=0 && t<data.length && matrix[t][c] && matrix[t][c].includes(v))) {
                                cls = ['bg-blue', 'bg-yellow', 'bg-green', 'bg-purple'][j]; break;
                            }
                        }
                        return `<span class="diff-num ${cls}">${v.toString().padStart(2, '0')}</span>`;
                    }).join('');
                    rowHtml += `<td class="diff-col">${cell}</td>`;
                }
                row.innerHTML = rowHtml; tbody.appendChild(row);
            });
        }

        function renderTableFoot(data, matrix, type) {
            const tfoot = document.getElementById('tfoot' + type);
            const last = data[data.length-1].nums.map(Number);
            const row = document.createElement('tr'); row.className = 'predict-row';
            let html = `<td colspan="2">✨ 下一期預測</td>`;
            for (let c=0; c<5; c++) {
                let counts = {};
                for (let i=1; i<data.length; i++) {
                    matrix[i][c].forEach(v => {
                        if (matrix.some((m, idx) => idx !== i && m[c] && m[c].includes(v))) counts[v] = (counts[v] || 0) + 1;
                    });
                }
                let hotDiffs = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,2).map(Number);
                let base = (type===1) ? last[c] : last.slice(0,c+1).reduce((a,b)=>(a+(b%10)),0);
                let preds = [];
                hotDiffs.forEach(d => { [base+d, Math.abs(base-d)].forEach(n => { if(n>=1 && n<=39) preds.push(n); })});
                preds = [...new Set(preds)];
                allPredictions.push(...preds); // 收集到總預測清單
                html += `<td>${preds.map(p=>p.toString().padStart(2,'0')).join(', ')}</td>`;
            }
            row.innerHTML = html; tfoot.appendChild(row);
        }

        function renderSummary(historyCounts) {
            // 1. 演算法熱門
            const predCounts = {};
            allPredictions.forEach(p => predCounts[p] = (predCounts[p] || 0) + 1);
            const topPreds = Object.keys(predCounts).sort((a,b)=>predCounts[b]-predCounts[a]).slice(0,6);
            document.getElementById('algoContent').innerHTML = topPreds.map(p => 
                `<span class="hot-num">${p.toString().padStart(2,'0')}<span class="count-tag">(${predCounts[p]})</span></span>`).join('');

            // 2. 歷史熱門
            const topHistory = Object.keys(historyCounts).sort((a,b)=>historyCounts[b]-historyCounts[a]).slice(0,6);
            document.getElementById('historyContent').innerHTML = topHistory.map(p => 
                `<span class="hot-num">${p.toString().padStart(2,'0')}<span class="count-tag">(${historyCounts[p]}次)</span></span>`).join('');

            // 3. 冷門號碼
            const coldNums = [];
            for(let i=1; i<=39; i++) { if(!historyCounts[i.toString().padStart(2,'0')]) coldNums.push(i); }
            document.getElementById('coldContent').innerHTML = coldNums.slice(0,10).map(p => 
                `<span class="hot-num" style="background:#444; color:#aaa;">${p.toString().padStart(2,'0')}</span>`).join('');
        }

        loadData();
    </script>
</body>
</html>
