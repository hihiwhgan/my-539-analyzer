<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 智慧分析 - 高對比回測版</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f4f4f2; padding: 20px; color: #555; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #6d6d6d; }
        
        /* 莫蘭迪配色 */
        .bg-blue   { background-color: #8E9AAF; color: white !important; }
        .bg-yellow { background-color: #D4A373; color: white !important; }
        .bg-green  { background-color: #A3B18A; color: white !important; }
        .bg-purple { background-color: #957DAD; color: white !important; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8em; table-layout: fixed; }
        th { background: #eaeaea; color: #666; padding: 10px; border: 1px solid #ddd; }
        td { padding: 6px 2px; border: 1px solid #efefef; text-align: center; }
        
        .ball { display: inline-block; width: 20px; height: 20px; line-height: 20px; background: #b8978e; color: white; border-radius: 50%; font-weight: bold; font-size: 0.75em; }
        .diff-num { display: inline-block; width: 20px; height: 20px; border-radius: 4px; font-family: monospace; font-weight: bold; }
        
        /* --- Footer 樣式強化 --- */
        .predict-row { 
            background-color: #2c2c2c !important; /* 更深的背景 */
            color: #ffffff !important;           /* 純白文字 */
            font-weight: bold;
        }
        .history-predict { 
            background-color: #444444 !important; /* 深灰背景 */
            color: #ffffff !important;           /* 強制改為純白，不再用淺灰 */
            font-weight: bold;
        }
        .predict-row td, .history-predict td { 
            border: 1px solid #555 !important; 
            padding: 10px 2px;
        }

        /* 命中號碼的特殊顏色 (亮橘黃) */
        .hit-num { 
            color: #ffcc00 !important; 
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .hit-badge { color: #ffcc00; font-weight: bold; margin-left: 3px; }
        .hit-rate { background: #d32f2f; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; margin-left: 10px; }
        
        .diff-col { background-color: #fafafa; border-left: 1px solid #eee !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>今彩 539 智慧預測 (25期樣本 / 20期視窗)</h1>
        <table id="mainTable">
            <thead>
                <tr>
                    <th style="width: 75px;">日期</th>
                    <th style="width: 140px;">開獎號碼</th>
                    <th>減前 1</th><th>減前 2</th><th>減前 3</th><th>減前 4</th><th>減前 5</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
            <tfoot id="tfoot"></tfoot>
        </table>
    </div>

    <script>
        async function loadData() {
            const response = await fetch('/api/data');
            const data = await response.json();
            
            const matrix = [];
            for (let i = 0; i < data.length; i++) {
                let d = [];
                if (i > 0) {
                    const prev = data[i-1].nums.map(Number);
                    const curr = data[i].nums.map(Number);
                    for (let c = 0; c < 5; c++) {
                        d.push(curr.map(n => Math.abs(n - prev[c])));
                    }
                } else { for(let c=0; c<5; c++) d.push(null); }
                matrix.push(d);
            }

            renderBody(data, matrix);
            renderFooter(data, matrix);
        }

        function renderBody(data, matrix) {
            const tbody = document.getElementById('tbody');
            data.forEach((item, i) => {
                const row = document.createElement('tr');
                const balls = item.nums.map(n => `<span class="ball">${n}</span>`).join(' ');
                let html = `<td><strong>${item.period}</strong></td><td>${balls}</td>`;
                for (let c = 0; c < 5; c++) {
                    if (i === 0 || !matrix[i][c]) { html += `<td class="diff-col">-</td>`; continue; }
                    let cells = matrix[i][c].map(v => {
                        let cls = '';
                        for (let j=0; j<=3; j++) {
                            if (i-(j+1) >= 0 && matrix[i-(j+1)][c] && matrix[i-(j+1)][c].includes(v)) {
                                cls = ['bg-blue', 'bg-yellow', 'bg-green', 'bg-purple'][j]; break;
                            }
                        }
                        return `<span class="diff-num ${cls}">${v.toString().padStart(2, '0')}</span>`;
                    }).join('');
                    html += `<td class="diff-col">${cells}</td>`;
                }
                row.innerHTML = html; tbody.appendChild(row);
            });
        }

        function renderFooter(data, matrix) {
            const tfoot = document.getElementById('tfoot');
            const totalCount = data.length;

            for (let offset = 4; offset >= 0; offset--) {
                const isFuture = (offset === 0);
                const targetIdx = totalCount - offset;
                const row = document.createElement('tr');
                row.className = isFuture ? 'predict-row' : 'history-predict';

                let label = isFuture ? "🔮 未來預測 (下期)" : `⏮️ 歷史回測 (${data[targetIdx].period})`;
                let html = `<td colspan="2" style="text-align:left; padding-left:15px;"><strong>${label}</strong></td>`;

                let allPredsInRow = [];
                let actualNums = isFuture ? [] : data[targetIdx].nums.map(Number);

                for (let c = 0; c < 5; c++) {
                    let start = Math.max(1, targetIdx - 20);
                    let end = targetIdx;
                    let counts = {};
                    
                    for (let i = start; i < end; i++) {
                        if (!matrix[i][c]) continue;
                        matrix[i][c].forEach(v => {
                            if (matrix.slice(start, i).some(m => m[c] && m[c].includes(v))) {
                                counts[v] = (counts[v] || 0) + 1;
                            }
                        });
                    }

                    let hotDiffs = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0, 2).map(Number);
                    let base = data[targetIdx - 1].nums.map(Number)[c];
                    let preds = [];
                    hotDiffs.forEach(d => { [base+d, Math.abs(base-d)].forEach(n => { if(n>=1 && n<=39) preds.push(n); })});
                    preds = [...new Set(preds)];
                    allPredsInRow.push(...preds);

                    let hits = preds.filter(p => actualNums.includes(p));
                    let cellContent = preds.map(p => {
                        let isHit = !isFuture && actualNums.includes(p);
                        // 如果命中，套用 .hit-num 樣式，否則就是一般白色
                        return `<span class="${isHit ? 'hit-num' : ''}">${p.toString().padStart(2,'0')}</span>`;
                    }).join(', ');

                    html += `<td class="diff-col">${cellContent} ${hits.length > 0 ? `<span class="hit-badge">✓</span>` : ''}</td>`;
                }

                if (!isFuture) {
                    let uniquePreds = [...new Set(allPredsInRow)];
                    let totalHits = actualNums.filter(n => uniquePreds.includes(n)).length;
                    let rate = ((totalHits / 5) * 100).toFixed(0);
                    html = html.replace('</strong>', `</strong> <span class="hit-rate">命中率: ${rate}%</span>`);
                }

                row.innerHTML = html;
                tfoot.appendChild(row);
            }
        }

        loadData();
    </script>
</body>
</html>
