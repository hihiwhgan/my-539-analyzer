<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>539 智慧分析 - 深度回測統計終端</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f4f4f2; padding: 20px; color: #444; }
        .container { max-width: 1550px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); margin-bottom: 30px; }
        h1 { text-align: center; color: #555; margin-bottom: 20px; }
        
        /* 色塊說明 (圖例) */
        .legend-section { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; font-size: 0.85em; }
        .legend-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #eee; padding-right: 15px; }
        .legend-group:last-child { border-right: none; }
        .legend-box { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
        .label-text { font-weight: bold; color: #666; }

        /* 莫蘭迪配色 */
        .bg-blue { background-color: #8E9AAF; color: white !important; }
        .bg-yellow { background-color: #D4A373; color: white !important; }
        .bg-green { background-color: #A3B18A; color: white !important; }
        .bg-purple { background-color: #957DAD; color: white !important; }

        /* 命中顏色 */
        .hit-single { color: #0000FF !important; text-decoration: underline; font-weight: 900; } 
        .hit-both { color: #FF0000 !important; text-decoration: underline; font-weight: 900; border: 1px solid #FF0000; padding: 0 1px; } 

        /* 表格樣式 */
        h2 { border-left: 6px solid #8E9AAF; padding-left: 12px; color: #555; font-size: 1.15em; margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82em; table-layout: fixed; }
        th { background: #f8fafc; color: #64748b; padding: 10px; border: 1px solid #e2e8f0; }
        td { padding: 6px 2px; border: 1px solid #f1f5f9; text-align: center; }
        
        .ball { display: inline-block; width: 22px; height: 22px; line-height: 22px; background: #b8978e; color: white; border-radius: 50%; font-weight: bold; font-size: 0.8em; }
        .diff-num { display: inline-block; width: 20px; border-radius: 3px; font-weight: bold; font-family: monospace; }

        /* 回測表分層 */
        .predict-row { background-color: #fffbeb !important; }
        .mode-label { font-size: 0.7em; font-weight: bold; padding: 1px 3px; border-radius: 3px; background: #eee; color: #777; margin-right: 4px; }
        .mode-line { display: block; border-bottom: 1px dashed #eee; padding: 5px 0; min-height: 20px; }
        .mode-line:last-child { border-bottom: none; }
        
        /* 號碼集合 Tag */
        .set-tag { display: inline-block; padding: 2px 5px; border-radius: 4px; font-size: 0.85em; font-weight: bold; margin: 2px; font-family: monospace; border: 1px solid #ddd; }
        .src-m1 { background: #e2e8f0; color: #475569; }
        .src-m2 { background: #fef3c7; color: #92400e; }
        .src-both { background: #1e293b; color: #fff; }

        #table-merged th { background: #1e293b; color: #fff; }
        #table-merged td { padding: 0; border: 1px solid #e2e8f0; vertical-align: middle; color: #000; font-weight: bold; }
        .period-cell { background: #f8fafc; font-weight: bold; font-size: 0.9em; padding: 10px 5px !important; }
        
        /* 底部累計命中列 */
        .stat-row { background-color: #334155 !important; color: #ffd700 !important; font-weight: bold; }
        .stat-row td { border: 1px solid #475569 !important; padding: 12px 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>今彩 539 智慧預測分析系統</h1>

        <div class="legend-section">
            <div class="legend-group">
                <span class="label-text">歷史間隔:</span>
                <span class="legend-box bg-blue"></span> 連莊 <span class="legend-box bg-yellow"></span> 隔1 <span class="legend-box bg-green"></span> 隔2 <span class="legend-box bg-purple"></span> 隔3
            </div>
            <div class="legend-group">
                <span class="label-text">命中標示:</span>
                <span style="color:#0000FF; text-decoration:underline; font-weight:bold;">藍(單模)</span>
                <span style="color:#FF0000; text-decoration:underline; border:1px solid #FF0000; padding:0 2px;">紅(雙模)</span>
            </div>
            <div class="legend-group">
                <span class="label-text">集合來源:</span>
                <span class="set-tag src-m1">M1</span> <span class="set-tag src-m2">M2</span> <span class="set-tag src-both">共識</span>
            </div>
        </div>

        <h2>表格一：基礎差值分析</h2>
        <table id="table1">
            <thead><tr><th style="width:75px">日期</th><th style="width:155px">開獎號碼</th><th>減前01</th><th>減前02</th><th>減前03</th><th>減前04</th><th>減前05</th></tr></thead>
            <tbody id="tbody1"></tbody>
        </table>

        <h2>表格二：累加尾數分析</h2>
        <table id="table2">
            <thead><tr><th style="width:75px">日期</th><th style="width:155px">開獎號碼</th><th>減(尾01)</th><th>減(尾1+2)</th><th>減(尾1~3)</th><th>減(尾1~4)</th><th>減(尾1~5)</th></tr></thead>
            <tbody id="tbody2"></tbody>
        </table>

        <h2>📊 十期雙模式分層回測與全集對照</h2>
        <table id="table-merged">
            <thead>
                <tr>
                    <th style="width: 110px;">期別/模式</th>
                    <th style="width: 155px;">當期獎號</th>
                    <th>位置 01 預測</th><th>位置 02 預測</th><th>位置 03 預測</th><th>位置 04 預測</th><th>位置 05 預測</th>
                    <th style="width: 250px;">全期預測號碼集合 (不重複)</th>
                </tr>
            </thead>
            <tbody id="tbody-merged"></tbody>
            <tfoot id="tfoot-merged"></tfoot>
        </table>
    </div>

    <script>
        let mode1Backtests = {}; 
        let mode2Backtests = {}; 
        const pad = (n) => n.toString().padStart(2, '0');

        async function loadData() {
            const response = await fetch('./data.json?t=' + new Date().getTime()); 
            const data = await response.json();
            const matrix1 = calculateMatrix(data, 1);
            const matrix2 = calculateMatrix(data, 2);
            renderMainTable(data, matrix1, 1);
            renderMainTable(data, matrix2, 2);
            renderMergedTable(data);
        }

        function calculateMatrix(data, type) {
            const matrix = [];
            for (let i = 0; i < data.length; i++) {
                let d = [];
                if (i > 0) {
                    const prev = data[i-1].nums.map(Number);
                    const curr = data[i].nums.map(Number);
                    if (type === 1) { for(let c=0; c<5; c++) d.push(curr.map(n => Math.abs(n - prev[c]))); }
                    else { const t = prev.map(n => n % 10); for(let c=0; c<5; c++) { let s=0; for(let k=0; k<=c; k++) s+=t[k]; d.push(curr.map(n => Math.abs(n - s))); } }
                } else { for(let c=0; c<5; c++) d.push(null); }
                matrix.push(d);
            }
            return matrix;
        }

        function renderMainTable(data, matrix, type) {
            const tbody = document.getElementById('tbody' + type);
            data.forEach((item, i) => {
                const row = document.createElement('tr');
                const balls = item.nums.map(n => `<span class="ball">${pad(n)}</span>`).join(' ');
                let html = `<td><strong>${item.period}</strong></td><td>${balls}</td>`;
                for (let c=0; c<5; c++) {
                    if (i === 0 || !matrix[i][c]) { html += `<td>-</td>`; continue; }
                    let cells = matrix[i][c].map(v => {
                        let cls = '';
                        for (let j=0; j<=3; j++) { if (i-(j+1)>=0 && matrix[i-(j+1)][c] && matrix[i-(j+1)][c].includes(v)) { cls = ['bg-blue', 'bg-yellow', 'bg-green', 'bg-purple'][j]; break; } }
                        return `<span class="diff-num ${cls}">${pad(v)}</span>`;
                    }).join('');
                    html += `<td class="diff-col">${cells}</td>`;
                }
                row.innerHTML = html; tbody.appendChild(row);
            });

            // 靜默計算 10 期回測數據
            const total = data.length;
            for (let offset = 10; offset >= 0; offset--) {
                const targetIdx = total - offset;
                if (targetIdx >= total && offset !== 0) continue;
                const isFuture = (offset === 0);
                let periodKey = isFuture ? "NEXT" : data[targetIdx].period;
                let predsForThisPeriod = [];
                for (let c=0; c<5; c++) {
                    let start = Math.max(1, (isFuture ? total : targetIdx) - 20);
                    let end = isFuture ? total : targetIdx;
                    let counts = {};
                    for (let i = start; i < end; i++) {
                        matrix[i][c].forEach(v => { if (matrix.slice(start, i).some(m => m[c] && m[c].includes(v))) counts[v] = (counts[v] || 0) + 1; });
                    }
                    let hot = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0, 2).map(Number);
                    let base = 0; const refIdx = (isFuture ? total : targetIdx) - 1;
                    if (type === 1) base = data[refIdx].nums.map(Number)[c];
                    else { const t = data[refIdx].nums.map(n => Number(n)%10); for(let k=0; k<=c; k++) base += t[k]; }
                    let p = []; hot.forEach(d => { [base+d, Math.abs(base-d)].forEach(n => { if(n>=1 && n<=39) p.push(n); })});
                    predsForThisPeriod.push([...new Set(p)]);
                }
                if (type === 1) mode1Backtests[periodKey] = predsForThisPeriod;
                else mode2Backtests[periodKey] = predsForThisPeriod;
            }
        }

        function renderMergedTable(data) {
            const tbody = document.getElementById('tbody-merged');
            const tfoot = document.getElementById('tfoot-merged');
            tbody.innerHTML = ''; tfoot.innerHTML = '';
            
            const total = data.length;
            let colHitStats = [0, 0, 0, 0, 0]; // 追蹤五個位置的累計命中次數
            let validBacktestCount = 0;

            for (let offset = 10; offset >= 0; offset--) {
                const targetIdx = total - offset;
                const isFuture = (offset === 0);
                if (!isFuture && targetIdx >= total) continue;
                if (!isFuture) validBacktestCount++;

                const period = isFuture ? "NEXT" : data[targetIdx].period;
                const actual = isFuture ? [] : data[targetIdx].nums.map(Number);
                const p1Row = mode1Backtests[period];
                const p2Row = mode2Backtests[period];

                const row = document.createElement('tr');
                if (isFuture) row.className = 'predict-row';

                let html = `<td class="period-cell">${period}<br><span class="mode-label">M1</span><br><span class="mode-label">M2</span></td>`;
                html += `<td>${isFuture ? "待開獎" : data[targetIdx].nums.map(n => `<span class="ball">${pad(n)}</span>`).join(' ')}</td>`;
                
                let rowUnionMap = {}; // 存儲該期所有不重複預測號碼及其來源

                for (let c = 0; c < 5; c++) {
                    const p1 = p1Row[c]; const p2 = p2Row[c];
                    p1.forEach(n => rowUnionMap[n] = (rowUnionMap[n] || 0) | 1);
                    p2.forEach(n => rowUnionMap[n] = (rowUnionMap[n] || 0) | 2);

                    const isColHit = !isFuture && (p1.some(n => actual.includes(n)) || p2.some(n => actual.includes(n)));
                    if (isColHit) colHitStats[c]++;

                    const renderLine = (preds, other) => preds.map(num => {
                        const isHit = !isFuture && actual.includes(num);
                        const isBoth = other.includes(num);
                        return `<span class="${isHit ? (isBoth ? 'hit-both' : 'hit-single') : ''}">${pad(num)}</span>`;
                    }).join(', ');

                    html += `<td><div class="mode-line">${renderLine(p1, p2) || '---'}</div><div class="mode-line">${renderLine(p2, p1) || '---'}</div></td>`;
                }

                // 右側不重複集合欄位
                let setHtml = Object.keys(rowUnionMap).sort((a,b)=>a-b).map(num => {
                    const src = rowUnionMap[num];
                    const cls = src === 3 ? "src-both" : (src === 1 ? "src-m1" : "src-m2");
                    return `<span class="set-tag ${cls}">${pad(num)}</span>`;
                }).join('');
                html += `<td style="text-align:left; padding:5px;">${setHtml}</td>`;
                
                row.innerHTML = html;
                tbody.appendChild(row);
            }

            // 底部累計命中率列
            const statRow = document.createElement('tr');
            statRow.className = 'stat-row';
            let statHtml = `<td colspan="2">📈 位置累計命中率 (近 ${validBacktestCount} 期)</td>`;
            colHitStats.forEach(hits => {
                const rate = ((hits / validBacktestCount) * 100).toFixed(0);
                statHtml += `<td>命中: ${hits} 期<br>(${rate}%)</td>`;
            });
            statHtml += `<td>(綜合參考值)</td>`;
            statRow.innerHTML = statHtml;
            tfoot.appendChild(statRow);
        }
        loadData();
    </script>
</body>
</html>
