name: 自動更新 539 資料

on:
  schedule:
    # 每天台灣時間 20:45 執行 (UTC 12:45)
    - cron: '45 12 * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 賦予寫入權限，才能提交 json 檔
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: pip install requests beautifulsoup4

      - name: 執行爬蟲腳本
        run: python update_data.py

      - name: 提交並推送更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          # 如果資料沒變動則不動作
          git commit -m "Auto update data.json" || exit 0
          git push